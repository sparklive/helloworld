name: Test Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    paths-ignore:
      - '**.md'

# 添加写入权限，以便发布 Release
permissions:
  contents: write

jobs:
  build:
    name: Test ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm_cortex-a9_vfpv3-d16
            target: mvebu-cortexa9
          - arch: mips_24kc
            target: ath79-generic
          - arch: mipsel_24kc
            target: mt7621
          - arch: aarch64_cortex-a53
            target: mvebu-cortexa53
          - arch: arm_cortex-a15_neon-vfpv4
            target: armvirt-32
          - arch: i386_pentium-mmx
            target: x86-geode
          - arch: x86_64
            target: x86-64

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine branch name
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BRANCH="${GITHUB_BASE_REF}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi
          echo "Building for $BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Determine changed packages
        run: |
          PKG_ROOTS=$(find . -name Makefile | grep -v ".*/src/Makefile" | sed -e 's@./\(.*\)/Makefile@\1/@')
          
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE_REF="origin/${BRANCH}"
          else
            BASE_REF="HEAD^"
          fi
          
          CHANGES=$(git diff --diff-filter=d --name-only $BASE_REF HEAD || echo "")

          PACKAGES=""
          for ROOT in $PKG_ROOTS; do
            for CHANGE in $CHANGES; do
              if [[ "$CHANGE" == "$ROOT"* ]]; then
                PACKAGE_NAME=$(echo "$ROOT" | sed -e 's@\(.*\)/@\1@')
                PACKAGES="$PACKAGES $PACKAGE_NAME"
                break
              fi
            done
          done
          
          PACKAGES="${PACKAGES:-luci-app-ssr-plus}"
          PACKAGES=$(echo $PACKAGES | xargs)

          echo "Detected packages: $PACKAGES"
          echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV

      - name: Build
        uses: immortalwrt/gh-action-sdk@v7
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: packages_ci
          V: s
          target: ${{ matrix.target }}
          packages: ${{ env.PACKAGES }}

      - name: Move created packages to project dir
        run: |
          mkdir -p ./output
          cp bin/packages/${{ matrix.arch }}/packages_ci/*.ipk ./output/ 2>/dev/null || true
          cp bin/targets/${{ matrix.target }}/*/*.ipk ./output/ 2>/dev/null || true

      - name: Collect metadata
        run: |
          MERGE_ID=$(git rev-parse --short HEAD)
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            PRNUMBER="PR-${{ github.event.pull_request.number }}"
          else
            PRNUMBER="push-$MERGE_ID"
          fi
          echo "ARCHIVE_NAME=${{ matrix.arch }}-$PRNUMBER" >> $GITHUB_ENV

      - name: Store packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}-packages
          path: output/*.ipk

  publish:
    name: Publish Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all_packages
          merge-multiple: true

      - name: Generate Tag Name
        id: tag
        run: |
          TAG_NAME="Build-$(date +'%Y.%m.%d-%H%M')"
          echo "release_tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Release Tag: $TAG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: ImmortalWrt Auto Build ${{ steps.tag.outputs.release_tag }}
          body: |
            Automatically compiled packages for ImmortalWrt.
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
          files: ./all_packages/*.ipk
          draft: false
          prerelease: false
